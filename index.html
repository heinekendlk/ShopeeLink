<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee Affiliate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ee4d2d;
            --secondary: #ff6b35;
        }
        body {
            background: linear-gradient(135deg, #fff5f3 0%, #ffe0d6 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(238,77,45,0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(238,77,45,0.3);
        }
        .link-result {
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .copy-btn:hover {
            background: var(--secondary);
        }
        .spinner-border {
            display: none;
        }
        .spinner-border.show {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-link mr-2"></i>Tạo Link Shopee Affiliate</h1>
            <p class="text-muted">Chuyển đổi link Shopee thành link kiếm tiền</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form id="linkForm">
                    <div class="form-group">
                        <label for="shopeeUrl"><i class="fas fa-shopping-bag mr-2"></i>Link Sản Phẩm Shopee</label>
                        <input 
                            type="url" 
                            class="form-control form-control-lg" 
                            id="shopeeUrl"
                            placeholder="Dán link Shopee vào đây: https://shopee.vn/..."
                            required
                        >
                        <small class="form-text text-muted">
                            Ví dụ: https://shopee.vn/product/123/456 hoặc https://shopee.vn/Tên-Sản-Phẩm-i.123.456
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="affiliateIds"><i class="fas fa-id-card mr-2"></i>Affiliate ID (cách nhau bởi dấu phẩy)</label>
                        <textarea 
                            class="form-control" 
                            id="affiliateIds"
                            rows="3"
                            placeholder="17323090153,17375990033"
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                        <i class="fas fa-magic mr-2"></i>
                        <span id="btnText">Tạo Link Ngay</span>
                        <div class="spinner-border spinner-border-sm ml-2"></div>
                    </button>
                </form>
            </div>
        </div>

        <div id="results" style="display: none;">
            <div class="card">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="fas fa-check-circle text-success mr-2"></i>Kết Quả</h5>
                </div>
                <div class="card-body" id="linksContainer"></div>
            </div>
        </div>

        <div id="error" class="alert alert-danger" style="display: none;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = 'http://localhost:8000';

        function showToast(msg, type = 'success') {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: type,
                title: msg,
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Đã copy link!');
            }).catch(() => {
                showToast('❌ Copy thất bại', 'error');
            });
        }

        $('#linkForm').on('submit', async function(e) {
            e.preventDefault();

            const url = $('#shopeeUrl').val().trim();
            const affiliateIds = $('#affiliateIds').val().trim();

            if (!url || !affiliateIds) {
                showToast('Vui lòng nhập đầy đủ thông tin', 'warning');
                return;
            }

            // Show loading
            $('#btnText').text('Đang xử lý...');
            $('.spinner-border').addClass('show');
            $('#error').hide();

            try {
                const response = await fetch(
                    `${API_URL}/?url=${encodeURIComponent(url)}&affiliate_ids=${encodeURIComponent(affiliateIds)}`
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Có lỗi xảy ra');
                }

                // Display results
                let html = '';
                data.affiliateLinks.forEach((link, index) => {
                    html += `
                        <div class="link-result">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong>Link ${index + 1} (ID: ${link.affiliate_id})</strong>
                                    <div class="text-break mt-2" style="font-size: 0.9rem;">
                                        ${link.affiliate_link}
                                    </div>
                                </div>
                                <button type="button" class="copy-btn" onclick="copyToClipboard('${link.affiliate_link}')">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                            </div>
                        </div>
                    `;
                });

                $('#linksContainer').html(html);
                $('#results').show();
                showToast(`✅ Tạo ${data.affiliateLinks.length} link thành công!`);

            } catch (error) {
                $('#error').text('❌ ' + error.message).show();
                showToast(error.message, 'error');
            } finally {
                $('#btnText').text('Tạo Link Ngay');
                $('.spinner-border').removeClass('show');
            }
        });
    </script>
</body>
</html>
